services:
  postgres:
    image: postgres:16-alpine
    container_name: luggizztik-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: luggizztik
      POSTGRES_PASSWORD: luggizztik_secret
      POSTGRES_DB: luggizztik
    ports:
      - "5433:5432"   # host 5433 (avoids conflict with existing 5432)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luggizztik -d luggizztik"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Runs Prisma migrations when Postgres is ready, then exits.
  prisma-migrate:
    image: node:20-alpine
    container_name: luggizztik-prisma-migrate
    working_dir: /app
    environment:
      DATABASE_URL: "postgresql://luggizztik:luggizztik_secret@postgres:5432/luggizztik"
    volumes:
      - .:/app
    command: sh -c "npm install && npx prisma generate && npx prisma migrate deploy"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # Prisma Studio — browse & edit your DB at http://localhost:5555
  prisma-studio:
    image: node:20-alpine
    container_name: luggizztik-prisma-studio
    working_dir: /app
    environment:
      DATABASE_URL: "postgresql://luggizztik:luggizztik_secret@postgres:5432/luggizztik"
    volumes:
      - .:/app
    ports:
      - "5555:5555"
    command: sh -c "npm install && npx prisma studio --port 5555 --hostname 0.0.0.0"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Adminer — lightweight SQL admin at http://localhost:8080
  adminer:
    image: adminer:latest
    container_name: luggizztik-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
