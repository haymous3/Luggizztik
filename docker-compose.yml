services:
  postgres:
    image: postgres:16-alpine
    container_name: luggizztik-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: luggizztik
      POSTGRES_PASSWORD: luggizztik_secret
      POSTGRES_DB: luggizztik
    ports:
      - "5433:5432"   # host 5433 (avoids conflict with existing 5432)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luggizztik -d luggizztik"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Runs Prisma migrations when Postgres is ready, then exits.
  # Uses postgres:5432 (service name) so the container can reach the DB; .env has localhost for the host app.
  prisma-migrate:
    image: node:20-alpine
    container_name: luggizztik-prisma-migrate
    working_dir: /app
    environment:
      DATABASE_URL: "postgresql://luggizztik:luggizztik_secret@postgres:5432/luggizztik"
      DIRECT_URL: "postgresql://luggizztik:luggizztik_secret@postgres:5432/luggizztik"
    volumes:
      - .:/app
    command: sh -c "export DATABASE_URL=\"postgresql://luggizztik:luggizztik_secret@postgres:5432/luggizztik\" && export DIRECT_URL=\"postgresql://luggizztik:luggizztik_secret@postgres:5432/luggizztik\" && npm install && npx prisma generate && npx prisma migrate deploy"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # Seeds the database (truck types, etc.). Run after migrations. One-off.
  # Default: seeds the Postgres container above (same compose).
  # To seed a different DB (e.g. production): pass DATABASE_URL when running:
  #   docker compose run --rm -e DATABASE_URL="postgresql://user:pass@host:5432/dbname" prisma-seed
  prisma-seed:
    image: node:20-alpine
    container_name: luggizztik-prisma-seed
    working_dir: /app
    environment:
      DATABASE_URL: "postgresql://luggizztik:luggizztik_secret@postgres:5432/luggizztik"
      DIRECT_URL: "postgresql://luggizztik:luggizztik_secret@postgres:5432/luggizztik"
    volumes:
      - .:/app
    command: sh -c "set -e && npm install --include=dev && npx prisma generate && echo 'Running seed for database...' && npx prisma db seed && echo 'Seed finished successfully.'"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # Prisma Studio — browse & edit your DB at http://localhost:5555
  # Uses postgres:5432 so the container can reach the DB (not localhost from .env).
  prisma-studio:
    image: node:20-alpine
    container_name: luggizztik-prisma-studio
    working_dir: /app
    environment:
      DATABASE_URL: "postgresql://luggizztik:luggizztik_secret@postgres:5432/luggizztik"
      DIRECT_URL: "postgresql://luggizztik:luggizztik_secret@postgres:5432/luggizztik"
    volumes:
      - .:/app
    ports:
      - "5555:5555"
    command: sh -c "npm install && npx prisma generate && export DATABASE_URL=\"postgresql://luggizztik:luggizztik_secret@postgres:5432/luggizztik\" && export DIRECT_URL=\"postgresql://luggizztik:luggizztik_secret@postgres:5432/luggizztik\" && npx prisma studio --port 5555 --hostname 0.0.0.0"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Adminer — lightweight SQL admin at http://localhost:8080
  adminer:
    image: adminer:latest
    container_name: luggizztik-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
